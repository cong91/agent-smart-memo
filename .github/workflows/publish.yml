name: Build & Publish (Targeted Artifacts)

on:
  push:
    branches: [master, work/**]
    tags: [v*]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: "Artifact target to publish"
        type: choice
        required: true
        default: openclaw
        options:
          - openclaw
          - paperclip
          - core
      dry_run:
        description: "Publish with --dry-run"
        type: boolean
        required: false
        default: true

jobs:
  build-targets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [openclaw, paperclip, core]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build target
        run: npm run build:${{ matrix.target }}

      - name: Build package artifact
        run: npm run package:${{ matrix.target }}

      - name: Pack target artifact
        run: npm run pack:${{ matrix.target }}

      - name: Upload packed tgz
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.target }}-tgz
          path: artifacts/npm/${{ matrix.target }}/*.tgz

      - name: Run baseline tests
        if: matrix.target == 'openclaw'
        run: npm test

      - name: Run openclaw adapter tests
        if: matrix.target == 'openclaw'
        run: npm run test:openclaw

      - name: Run paperclip adapter tests
        if: matrix.target == 'paperclip'
        run: npm run test:paperclip

  publish-target:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-targets
    steps:
      - uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve publish target/mode
        id: publish-meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "target=openclaw" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare selected package
        run: |
          npm run build:${{ steps.publish-meta.outputs.target }}
          npm run package:${{ steps.publish-meta.outputs.target }}

      - name: Publish selected target
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ steps.publish-meta.outputs.dry_run }}" = "true" ]; then
            node scripts/publish-target.mjs ${{ steps.publish-meta.outputs.target }} --dry-run
          else
            node scripts/publish-target.mjs ${{ steps.publish-meta.outputs.target }}
          fi
